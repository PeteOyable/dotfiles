shell:
  program: /opt/homebrew/bin/fish
  args:
    - --login

font:
  size: 13
  normal:
    family: Hack Nerd Font
    style: Regular

  bold:
    family: Hack Nerd Font
    style: Bold

  italic:
    family: Hack Nerd Font
    style: Italic

  bold_italic:
    family: Hack Nerd Font
    style: BoldItalic

env:
  TERM: xterm-256color

window:
  decorations: none

import:
  - ~/.config/alacritty/catppuccin/catppuccin-frappe.yml
